<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展示会タイムトラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#1a1d2e;--surface2:#252840;
  --accent:#6c63ff;--accent2:#ff6584;--accent3:#43e97b;--accent4:#ffd43b;
  --text:#e8eaf6;--text-muted:#8890b5;--border:#2d3158;
  --shadow:0 8px 32px rgba(0,0,0,.4);
}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px;}
h1{text-align:center;font-size:1.6rem;font-weight:700;letter-spacing:.05em;margin-bottom:6px;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:24px;}

/* ===== SETUP ===== */
#setup-panel{max-width:720px;margin:0 auto 32px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:var(--shadow);}
.setup-section{margin-bottom:24px;}
.setup-title{font-size:1rem;font-weight:600;color:var(--accent);margin-bottom:14px;}
.form-row{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px;}
label{font-size:.78rem;color:var(--text-muted);font-weight:500;letter-spacing:.04em;}
input[type="number"],input[type="time"],input[type="date"],input[type="text"]{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:.95rem;outline:none;transition:border-color .2s;width:100%;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15);}
#days-container{display:flex;flex-direction:column;gap:10px;max-height:280px;overflow-y:auto;margin-bottom:12px;}
.day-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border-radius:12px;padding:12px 14px;border:1px solid var(--border);flex-wrap:wrap;}
.day-label{font-size:.85rem;font-weight:600;color:var(--accent);min-width:50px;}
.day-row input{font-size:.88rem;padding:7px 10px;flex:1;min-width:100px;}
.sep{color:var(--text-muted);font-size:.85rem;white-space:nowrap;}

/* targets table */
.targets-table{width:100%;border-collapse:collapse;margin-top:4px;}
.targets-table th{font-size:.75rem;color:var(--text-muted);font-weight:600;padding:8px 10px;text-align:center;background:var(--surface2);border:1px solid var(--border);}
.targets-table td{padding:8px 10px;border:1px solid var(--border);text-align:center;background:var(--surface);}
.targets-table td:first-child{text-align:left;font-size:.85rem;font-weight:600;color:var(--text-muted);white-space:nowrap;background:var(--surface2);}
.targets-table input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);font-size:.9rem;width:90px;text-align:center;outline:none;}
.targets-table input:focus{border-color:var(--accent);}

.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,#6c63ff,#9c63ff);border:none;border-radius:12px;color:white;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:.05em;transition:opacity .2s,transform .1s;margin-top:8px;}
.btn-start:hover{opacity:.9;transform:translateY(-1px);}

/* ===== DASHBOARD ===== */
#dashboard{display:none;max-width:1000px;margin:0 auto;}
.dashboard-header{text-align:center;margin-bottom:20px;}
.event-name{font-size:1.3rem;font-weight:700;}
.current-time{font-size:2.8rem;font-weight:800;letter-spacing:.06em;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin:8px 0;}
.current-date{font-size:.9rem;color:var(--text-muted);}
.status-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.8rem;font-weight:600;margin-top:6px;letter-spacing:.05em;}
.status-open{background:rgba(67,233,123,.15);color:var(--accent3);border:1px solid rgba(67,233,123,.3);}
.status-closed{background:rgba(255,101,132,.15);color:var(--accent2);border:1px solid rgba(255,101,132,.3);}
.status-upcoming{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3);}
.status-ended{background:rgba(136,144,181,.15);color:var(--text-muted);border:1px solid var(--border);}

.pip-btn{display:inline-flex;align-items:center;gap:8px;margin-top:12px;padding:9px 20px;background:linear-gradient(135deg,#252840,#1a1d2e);border:1px solid var(--accent);border-radius:30px;color:var(--accent);font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;letter-spacing:.04em;}
.pip-btn:hover{background:var(--accent);color:white;box-shadow:0 0 16px rgba(108,99,255,.4);}
#pip-not-supported{display:none;font-size:.75rem;color:var(--accent2);margin-top:8px;}

/* Time cards */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.card.day::before{background:linear-gradient(90deg,#6c63ff,#9c63ff);}
.card.total::before{background:linear-gradient(90deg,#ff6584,#ff9a9e);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.card-title{font-size:.78rem;color:var(--text-muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.card-icon{font-size:1.3rem;}
.big-percent{font-size:2.8rem;font-weight:800;line-height:1;margin-bottom:4px;}
.card.day .big-percent{color:#9c63ff;}
.card.total .big-percent{color:var(--accent2);}
.time-detail{font-size:.82rem;color:var(--text-muted);margin-bottom:12px;}
.time-detail strong{color:var(--text);}
.progress-wrap{background:var(--surface2);border-radius:8px;height:9px;overflow:hidden;margin-bottom:7px;}
.progress-bar{height:100%;border-radius:8px;transition:width .8s ease;}
.card.day .progress-bar{background:linear-gradient(90deg,#6c63ff,#9c63ff);}
.card.total .progress-bar{background:linear-gradient(90deg,#ff6584,#ff9a9e);}
.progress-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-muted);}
.remain-row{display:flex;gap:10px;margin-top:12px;}
.remain-chip{background:var(--surface2);border-radius:10px;padding:7px 10px;flex:1;text-align:center;}
.rc-label{font-size:.68rem;color:var(--text-muted);margin-bottom:2px;}
.rc-val{font-size:.95rem;font-weight:700;}

/* Schedule */
.schedule-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.section-title{font-size:.78rem;color:var(--text-muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px;}
.day-timeline{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;}
.day-block{flex:1;min-width:80px;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--border);background:var(--surface2);}
.day-block.today{background:rgba(108,99,255,.15);border-color:var(--accent);box-shadow:0 0 12px rgba(108,99,255,.2);}
.day-block.past{opacity:.5;}
.db-label{font-size:.68rem;color:var(--text-muted);font-weight:600;}
.db-date{font-size:.72rem;color:var(--text-muted);margin:2px 0;}
.db-time{font-size:.65rem;color:var(--text-muted);}
.db-pct{font-size:1.05rem;font-weight:700;margin:4px 0;}
.day-block.today .db-label,.day-block.today .db-pct{color:var(--accent);}

/* ===== KPI SECTION ===== */
.kpi-section{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);}
.kpi-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.kpi-tab{padding:7px 18px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:.2s;}
.kpi-tab.active.lead{background:rgba(108,99,255,.2);border-color:var(--accent);color:var(--accent);}
.kpi-tab.active.na{background:rgba(255,212,59,.15);border-color:var(--accent4);color:var(--accent4);}

/* KPI Summary row */
.kpi-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.kpi-chip{background:var(--surface2);border-radius:12px;padding:12px 14px;border:1px solid var(--border);text-align:center;}
.kpi-chip-label{font-size:.68rem;color:var(--text-muted);margin-bottom:4px;letter-spacing:.05em;}
.kpi-chip-val{font-size:1.5rem;font-weight:800;}
.kpi-chip-sub{font-size:.72rem;color:var(--text-muted);margin-top:2px;}
.kpi-chip.highlight-lead .kpi-chip-val{color:var(--accent);}
.kpi-chip.highlight-na .kpi-chip-val{color:var(--accent4);}
.kpi-chip.ok .kpi-chip-val{color:var(--accent3);}
.kpi-chip.warn .kpi-chip-val{color:var(--accent4);}
.kpi-chip.danger .kpi-chip-val{color:var(--accent2);}

/* KPI day table */
.kpi-day-table{width:100%;border-collapse:collapse;}
.kpi-day-table th{font-size:.72rem;color:var(--text-muted);font-weight:600;padding:8px 10px;text-align:center;background:var(--surface2);border:1px solid var(--border);}
.kpi-day-table td{padding:8px 10px;border:1px solid var(--border);text-align:center;font-size:.88rem;}
.kpi-day-table tr:nth-child(even) td{background:rgba(37,40,64,.4);}
.kpi-day-table td:first-child{font-weight:600;color:var(--accent);background:rgba(108,99,255,.08);}
.kpi-day-table td.today-row{color:var(--text);}
.rate-cell{font-size:.78rem;}
.rate-ok{color:var(--accent3);}
.rate-warn{color:var(--accent4);}
.rate-danger{color:var(--accent2);}

/* input row in table */
.kpi-input-cell input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;color:var(--text);font-size:.88rem;width:80px;text-align:center;outline:none;}
.kpi-input-cell input:focus{border-color:var(--accent);}

.progress-wrap-sm{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;margin-top:4px;}
.progress-bar-sm{height:100%;border-radius:4px;}
.bar-lead{background:linear-gradient(90deg,#6c63ff,#9c63ff);}
.bar-na{background:linear-gradient(90deg,#ffd43b,#ffaa00);}

/* footer */
.footer-actions{text-align:center;margin-top:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-reset{background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);padding:8px 20px;font-size:.85rem;cursor:pointer;transition:.2s;}
.btn-reset:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-save{background:transparent;border:1px solid var(--accent3);border-radius:10px;color:var(--accent3);padding:8px 20px;font-size:.85rem;cursor:pointer;transition:.2s;}
.btn-save:hover{background:var(--accent3);color:#0f1117;}

/* PiP */
#pip-content{display:none;}

@media(max-width:640px){
  .cards-grid{grid-template-columns:1fr;}
  .kpi-summary{grid-template-columns:1fr 1fr;}
  .current-time{font-size:2rem;}
}
</style>
</head>
<body>

<h1>🏢 展示会タイムトラッカー</h1>
<p class="subtitle">タイム進捗 × リード・NA数をリアルタイムで可視化</p>

<!-- ===== SETUP ===== -->
<div id="setup-panel">

  <div class="setup-section">
    <div class="setup-title">⚙️ 基本設定</div>
    <div class="form-row">
      <div class="form-group">
        <label>会期日数</label>
        <input type="number" id="num-days" min="1" max="14" value="3">
      </div>
      <div class="form-group" style="flex:2">
        <label>展示会名（任意）</label>
        <input type="text" id="event-name" placeholder="例: Japan IT Week 2026">
      </div>
    </div>
    <div id="days-container"></div>
  </div>

  <div class="setup-section">
    <div class="setup-title">🎯 目標設定（日別）</div>
    <div style="overflow-x:auto;">
      <table class="targets-table" id="targets-table">
        <thead id="targets-head"></thead>
        <tbody id="targets-body"></tbody>
      </table>
    </div>
  </div>

  <button class="btn-start" onclick="startTracker()">🚀 トラッキング開始</button>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">

  <div class="dashboard-header">
    <div class="event-name" id="d-event-name"></div>
    <div class="current-time" id="d-clock"></div>
    <div class="current-date" id="d-date"></div>
    <div id="d-status" class="status-badge"></div><br>
    <button class="pip-btn" onclick="openPiP()" id="pip-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="11" width="9" height="6" rx="1" fill="currentColor" stroke="none" opacity=".5"/><polyline points="8 17 8 21"/><line x1="5" y1="21" x2="11" y2="21"/></svg>
      📌 他の画面に重ねて表示（PiPモード）
    </button>
    <div id="pip-not-supported"></div>
  </div>

  <!-- Time progress -->
  <div class="cards-grid">
    <div class="card day">
      <div class="card-header"><span class="card-title">📅 本日の時間進捗</span><span class="card-icon">☀️</span></div>
      <div class="big-percent" id="d-day-pct">—</div>
      <div class="time-detail" id="d-day-detail"></div>
      <div class="progress-wrap"><div class="progress-bar" id="d-day-bar" style="width:0%"></div></div>
      <div class="progress-labels"><span id="d-day-start"></span><span id="d-day-end"></span></div>
      <div class="remain-row">
        <div class="remain-chip"><div class="rc-label">⏱ 経過</div><div class="rc-val" id="d-day-elapsed">—</div></div>
        <div class="remain-chip"><div class="rc-label">⏳ 残り</div><div class="rc-val" id="d-day-remain">—</div></div>
      </div>
    </div>
    <div class="card total">
      <div class="card-header"><span class="card-title">🗓 全体の時間進捗</span><span class="card-icon">🏁</span></div>
      <div class="big-percent" id="d-total-pct">—</div>
      <div class="time-detail" id="d-total-detail"></div>
      <div class="progress-wrap"><div class="progress-bar" id="d-total-bar" style="width:0%"></div></div>
      <div class="progress-labels"><span id="d-total-start"></span><span id="d-total-end"></span></div>
      <div class="remain-row">
        <div class="remain-chip"><div class="rc-label">⏱ 経過（全体）</div><div class="rc-val" id="d-total-elapsed">—</div></div>
        <div class="remain-chip"><div class="rc-label">⏳ 残り（全体）</div><div class="rc-val" id="d-total-remain">—</div></div>
      </div>
    </div>
  </div>

  <!-- Schedule -->
  <div class="schedule-card">
    <div class="section-title">📆 日程スケジュール</div>
    <div class="day-timeline" id="d-timeline"></div>
  </div>

  <!-- KPI Section -->
  <div class="kpi-section">
    <div class="section-title">📊 リード・NA数トラッカー</div>

    <div class="kpi-tabs">
      <div class="kpi-tab active lead" onclick="switchKpi('lead')">🟣 リード数</div>
      <div class="kpi-tab na" onclick="switchKpi('na')">🟡 NA数</div>
    </div>

    <!-- Summary chips -->
    <div class="kpi-summary">
      <div class="kpi-chip" id="chip-target">
        <div class="kpi-chip-label">🎯 全体目標</div>
        <div class="kpi-chip-val" id="chip-target-val">—</div>
        <div class="kpi-chip-sub">件</div>
      </div>
      <div class="kpi-chip" id="chip-actual">
        <div class="kpi-chip-label">✅ 現在の合計</div>
        <div class="kpi-chip-val" id="chip-actual-val">—</div>
        <div class="kpi-chip-sub">件</div>
      </div>
      <div class="kpi-chip" id="chip-rate">
        <div class="kpi-chip-label">📈 達成率</div>
        <div class="kpi-chip-val" id="chip-rate-val">—</div>
        <div class="kpi-chip-sub" id="chip-rate-sub"></div>
      </div>
      <div class="kpi-chip" id="chip-forecast">
        <div class="kpi-chip-label">🔮 見込み着地</div>
        <div class="kpi-chip-val" id="chip-forecast-val">—</div>
        <div class="kpi-chip-sub">件（ペース維持時）</div>
      </div>
    </div>

    <!-- Day table -->
    <div style="overflow-x:auto;">
      <table class="kpi-day-table" id="kpi-day-table">
        <thead>
          <tr>
            <th>日程</th>
            <th>目標</th>
            <th>実績入力</th>
            <th>達成率</th>
            <th>残り</th>
            <th>進捗バー</th>
          </tr>
        </thead>
        <tbody id="kpi-tbody"></tbody>
        <tfoot id="kpi-tfoot"></tfoot>
      </table>
    </div>
  </div>

  <div class="footer-actions">
    <button class="btn-save" onclick="saveData()">💾 データを保存</button>
    <button class="btn-reset" onclick="resetTracker()">⚙️ 設定に戻る</button>
  </div>
</div>

<!-- PiP hidden template -->
<div id="pip-content"></div>

<script>
let config=null, timerInterval=null, pipWin=null, pipInterval=null;
let currentKpi='lead';
// actuals[dayIndex] = {lead: N, na: N}
let actuals=[];

// ===== SETUP =====
function buildDayRows(){
  const n=parseInt(document.getElementById('num-days').value)||1;
  const container=document.getElementById('days-container');
  const today=new Date();
  while(container.children.length<n){
    const i=container.children.length;
    const d=new Date(today);d.setDate(today.getDate()+i);
    const dateStr=d.toISOString().slice(0,10);
    const row=document.createElement('div');row.className='day-row';
    const isFirst=i===0;
    row.innerHTML=`<span class="day-label">Day ${i+1}</span>
      <input type="date" value="${dateStr}" class="d-date" ${isFirst?'oninput="autoFillDates()"':''}>
      <span class="sep">開場</span><input type="time" value="10:00" class="d-start" ${isFirst?'oninput="autoFillTimes()"':''}>
      <span class="sep">〜</span><input type="time" value="17:00" class="d-end" ${isFirst?'oninput="autoFillTimes()"':''}>`;
    container.appendChild(row);
  }
  while(container.children.length>n)container.removeChild(container.lastChild);
  buildTargetsTable();
}

// 1日目の日付変更で2日目以降を連続で自動入力
function autoFillDates(){
  const rows=document.querySelectorAll('.day-row');
  const firstDate=rows[0].querySelector('.d-date').value;
  if(!firstDate)return;
  const base=new Date(firstDate);
  for(let i=1;i<rows.length;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    rows[i].querySelector('.d-date').value=d.toISOString().slice(0,10);
  }
}

// 1日目の開場時間変更で2日目以降を同じ時間に自動入力
function autoFillTimes(){
  const rows=document.querySelectorAll('.day-row');
  const firstStart=rows[0].querySelector('.d-start').value;
  const firstEnd=rows[0].querySelector('.d-end').value;
  for(let i=1;i<rows.length;i++){
    rows[i].querySelector('.d-start').value=firstStart;
    rows[i].querySelector('.d-end').value=firstEnd;
  }
}

function buildTargetsTable(){
  const n=parseInt(document.getElementById('num-days').value)||1;
  const head=document.getElementById('targets-head');
  const body=document.getElementById('targets-body');
  let headHtml='<tr><th>指標</th>';
  for(let i=0;i<n;i++) headHtml+=`<th>Day ${i+1}</th>`;
  headHtml+='<th>合計</th></tr>';
  head.innerHTML=headHtml;

  const metrics=[{key:'lead',label:'🟣 リード数',default:500},{key:'na',label:'🟡 NA数',default:40}];
  body.innerHTML='';
  metrics.forEach(m=>{
    let row=`<tr><td>${m.label}</td>`;
    let totalId=`tgt-${m.key}-total`;
    for(let i=0;i<n;i++){
      row+=`<td><input type="number" id="tgt-${m.key}-${i}" value="${m.default}" min="0" oninput="updateTargetTotal('${m.key}')"></td>`;
    }
    row+=`<td id="${totalId}" style="font-weight:700;color:var(--accent);">${m.default*n}</td></tr>`;
    body.innerHTML+=row;
  });
}

function updateTargetTotal(key){
  const n=parseInt(document.getElementById('num-days').value)||1;
  let total=0;
  for(let i=0;i<n;i++){
    const el=document.getElementById(`tgt-${key}-${i}`);
    total+=parseInt(el?.value)||0;
  }
  const tel=document.getElementById(`tgt-${key}-total`);
  if(tel)tel.textContent=total;
}

document.getElementById('num-days').addEventListener('input',buildDayRows);
buildDayRows();

// ===== START =====
function startTracker(){
  const rows=document.querySelectorAll('.day-row');
  const days=[];
  for(const row of rows){
    const date=row.querySelector('.d-date').value;
    const start=row.querySelector('.d-start').value;
    const end=row.querySelector('.d-end').value;
    if(!date||!start||!end){alert('全ての日程を入力してください');return;}
    days.push({date,start,end});
  }
  days.sort((a,b)=>a.date.localeCompare(b.date));
  const n=days.length;

  const targets=days.map((_,i)=>({
    lead:parseInt(document.getElementById(`tgt-lead-${i}`)?.value)||0,
    na:parseInt(document.getElementById(`tgt-na-${i}`)?.value)||0,
  }));

  // load saved actuals or init
  const saved=localStorage.getItem('exhibition-actuals');
  actuals=saved?JSON.parse(saved):days.map(()=>({lead:0,na:0}));
  if(actuals.length!==n) actuals=days.map(()=>({lead:0,na:0}));

  config={eventName:document.getElementById('event-name').value||'展示会',days,targets};
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('d-event-name').textContent=config.eventName;

  if(!('documentPictureInPicture' in window)){
    document.getElementById('pip-btn').style.display='none';
    document.getElementById('pip-not-supported').textContent='⚠️ PiPはChrome/Edge 116以上で対応';
    document.getElementById('pip-not-supported').style.display='block';
  }

  buildTimeline();buildKpiTable();updateDashboard();
  timerInterval=setInterval(updateDashboard,1000);
}

// ===== HELPERS =====
function pDT(date,time){return new Date(`${date}T${time}:00`);}
function fDur(ms){
  if(ms<0)ms=0;
  const m=Math.floor(ms/60000),h=Math.floor(m/60),mm=m%60;
  return h>0?`${h}時間${mm}分`:`${mm}分`;
}
function pct(v,t){return t<=0?0:Math.min(100,Math.max(0,v/t*100));}
function rateClass(r){return r>=100?'ok':r>=80?'warn':'danger';}

// ===== TIMELINE =====
function buildTimeline(){
  const c=document.getElementById('d-timeline');c.innerHTML='';
  config.days.forEach((d,i)=>{
    const b=document.createElement('div');b.className='day-block';b.id=`db-${i}`;
    b.innerHTML=`<div class="db-label">Day ${i+1}</div><div class="db-date">${d.date.slice(5).replace('-','/')}</div><div class="db-time">${d.start}〜${d.end}</div><div class="db-pct" id="dbp-${i}">—</div>`;
    c.appendChild(b);
  });
}

// ===== KPI TABLE =====
function buildKpiTable(){
  const tbody=document.getElementById('kpi-tbody');
  const tfoot=document.getElementById('kpi-tfoot');
  tbody.innerHTML='';
  const todayStr=new Date().toISOString().slice(0,10);

  config.days.forEach((d,i)=>{
    const tr=document.createElement('tr');
    const isToday=d.date===todayStr;
    tr.innerHTML=`
      <td>Day ${i+1}<br><span style="font-size:.72rem;color:var(--text-muted)">${d.date.slice(5).replace('-','/')}</span></td>
      <td id="kt-target-${i}">—</td>
      <td class="kpi-input-cell"><input type="number" id="kt-actual-${i}" min="0" value="${actuals[i]?.[currentKpi]||0}" oninput="onActualInput(${i})"></td>
      <td id="kt-rate-${i}" class="rate-cell">—</td>
      <td id="kt-remain-${i}">—</td>
      <td style="min-width:100px"><div class="progress-wrap-sm"><div class="progress-bar-sm ${currentKpi==='lead'?'bar-lead':'bar-na'}" id="kt-bar-${i}" style="width:0%"></div></div></td>
    `;
    tbody.appendChild(tr);
  });

  // total row
  tfoot.innerHTML=`<tr style="font-weight:700;background:var(--surface2)">
    <td style="color:var(--accent)">合計</td>
    <td id="kt-target-total">—</td>
    <td id="kt-actual-total" style="text-align:center">—</td>
    <td id="kt-rate-total" class="rate-cell">—</td>
    <td id="kt-remain-total">—</td>
    <td><div class="progress-wrap-sm"><div class="progress-bar-sm ${currentKpi==='lead'?'bar-lead':'bar-na'}" id="kt-bar-total" style="width:0%"></div></div></td>
  </tr>`;

  refreshKpiTable();
}

function onActualInput(i){
  const val=parseInt(document.getElementById(`kt-actual-${i}`).value)||0;
  if(!actuals[i])actuals[i]={lead:0,na:0};
  actuals[i][currentKpi]=val;
  refreshKpiTable();
  updateSummaryChips();
}

function refreshKpiTable(){
  if(!config)return;
  const k=currentKpi;
  const barClass=k==='lead'?'bar-lead':'bar-na';
  let totalTarget=0,totalActual=0;

  config.days.forEach((d,i)=>{
    const target=config.targets[i][k]||0;
    const actual=actuals[i]?.[k]||0;
    const r=pct(actual,target);
    const remain=Math.max(0,target-actual);
    totalTarget+=target;totalActual+=actual;

    const el=id=>document.getElementById(id);
    // sync input value
    const inp=el(`kt-actual-${i}`);
    if(inp&&parseInt(inp.value)!==actual)inp.value=actual;

    el(`kt-target-${i}`).textContent=target;
    const rEl=el(`kt-rate-${i}`);
    rEl.textContent=target>0?r.toFixed(1)+'%':'—';
    rEl.className='rate-cell rate-'+rateClass(r);
    el(`kt-remain-${i}`).textContent='+'+remain;
    const bar=el(`kt-bar-${i}`);
    if(bar){bar.style.width=r+'%';bar.className=`progress-bar-sm ${barClass}`;}
  });

  const totalR=pct(totalActual,totalTarget);
  const el=id=>document.getElementById(id);
  el('kt-target-total').textContent=totalTarget;
  el('kt-actual-total').textContent=totalActual;
  const trEl=el('kt-rate-total');
  trEl.textContent=totalTarget>0?totalR.toFixed(1)+'%':'—';
  trEl.className='rate-cell rate-'+rateClass(totalR);
  el('kt-remain-total').textContent='+'+Math.max(0,totalTarget-totalActual);
  const tb=el('kt-bar-total');
  if(tb){tb.style.width=totalR+'%';tb.className=`progress-bar-sm ${barClass}`;}
}

function updateSummaryChips(){
  if(!config)return;
  const k=currentKpi;
  const totalTarget=config.targets.reduce((s,t)=>s+t[k],0);
  const totalActual=actuals.reduce((s,a)=>s+(a?.[k]||0),0);
  const r=pct(totalActual,totalTarget);

  // elapsed exhibition hours for pace
  const now=new Date();
  let elMin=0,remMin=0;
  for(const d of config.days){
    const s=pDT(d.date,d.start),e=pDT(d.date,d.end);
    if(now>s)elMin+=(Math.min(now,e)-s)/60000;
    if(now<e)remMin+=(e-Math.max(now,s))/60000;
  }
  const elH=elMin/60,remH=remMin/60;
  const pace=elH>0?totalActual/elH:0;
  const forecast=Math.round(pace*(elH+remH));

  const el=id=>document.getElementById(id);
  el('chip-target-val').textContent=totalTarget;
  el('chip-actual-val').textContent=totalActual;

  const rEl=el('chip-rate');
  el('chip-rate-val').textContent=totalTarget>0?r.toFixed(1)+'%':'—';
  el('chip-rate-sub').textContent=`目標まで残り ${Math.max(0,totalTarget-totalActual)} 件`;
  rEl.className='kpi-chip '+rateClass(r);

  const fEl=el('chip-forecast');
  el('chip-forecast-val').textContent=elH>0?forecast+'':'—';
  fEl.className='kpi-chip '+(forecast>=totalTarget?'ok':forecast>=totalTarget*.8?'warn':'danger');

  // highlight color
  const isLead=k==='lead';
  el('chip-target').querySelector('.kpi-chip-val').style.color=isLead?'var(--accent)':'var(--accent4)';
  el('chip-actual').querySelector('.kpi-chip-val').style.color=isLead?'var(--accent)':'var(--accent4)';
}

function switchKpi(k){
  currentKpi=k;
  document.querySelectorAll('.kpi-tab').forEach(t=>t.classList.remove('active'));
  const activeTab=k==='lead'?document.querySelector('.kpi-tab.lead'):document.querySelector('.kpi-tab.na');
  activeTab.classList.add('active');

  // reload input values for switched metric
  config.days.forEach((_,i)=>{
    const inp=document.getElementById(`kt-actual-${i}`);
    if(inp) inp.value=actuals[i]?.[k]||0;
  });
  refreshKpiTable();
  updateSummaryChips();
}

// ===== MAIN UPDATE =====
function calcState(){
  const now=new Date(),days=config.days;
  const gS=pDT(days[0].date,days[0].start),gE=pDT(days[days.length-1].date,days[days.length-1].end);
  const tSpan=gE-gS,tElap=Math.min(Math.max(0,now-gS),tSpan),tPct=pct(tElap,tSpan);
  const todayStr=now.toISOString().slice(0,10);
  const ti=days.findIndex(d=>d.date===todayStr);
  let dPct=0,dElap=0,dSpan=0,dRemain=0,dStart='',dEnd='',status='',sCls='',dDetail='';
  if(ti>=0){
    const td=days[ti],dS=pDT(td.date,td.start),dE=pDT(td.date,td.end);
    dSpan=dE-dS;dElap=now-dS;dPct=pct(dElap,dSpan);dRemain=Math.max(0,dE-now);
    dStart=td.start;dEnd=td.end;
    if(now<dS){dDetail=`開場まで <strong>${fDur(dS-now)}</strong>`;status='開場前';sCls='status-upcoming';}
    else if(now>dE){dDetail='本日の展示会は終了しました';status='本日終了';sCls='status-closed';}
    else{dDetail=`本日 <strong>${fDur(dSpan)}</strong> のうち <strong>${fDur(dElap)}</strong> 経過`;status='🟢 開催中';sCls='status-open';}
  } else {
    if(todayStr<days[0].date){dDetail=`開催まで <strong>${fDur(gS-now)}</strong>`;status='開催前';sCls='status-upcoming';}
    else if(todayStr>days[days.length-1].date){dDetail='展示会は終了しました';status='終了';sCls='status-ended';}
    else{const nx=days.find(d=>d.date>todayStr);dDetail=nx?`次の開催日まで <strong>${fDur(pDT(nx.date,nx.start)-now)}</strong>`:'休日';status='休日';sCls='status-closed';}
  }
  return{now,days,gS,gE,tSpan,tElap,tPct,todayStr,ti,dPct,dElap,dSpan,dRemain,dStart,dEnd,status,sCls,dDetail};
}

function updateDashboard(){
  const s=calcState();
  const{now,days,gS,gE,tSpan,tElap,tPct,todayStr,ti,dPct,dElap,dRemain,dStart,dEnd,status,sCls,dDetail}=s;

  document.getElementById('d-clock').textContent=now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('d-date').textContent=now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  document.getElementById('d-total-pct').textContent=tPct.toFixed(1)+'%';
  document.getElementById('d-total-bar').style.width=tPct+'%';
  document.getElementById('d-total-start').textContent=days[0].date.slice(5).replace('-','/')+' '+days[0].start;
  document.getElementById('d-total-end').textContent=days[days.length-1].date.slice(5).replace('-','/')+' '+days[days.length-1].end;
  document.getElementById('d-total-elapsed').textContent=tElap>0?fDur(tElap):'未開始';
  document.getElementById('d-total-remain').textContent=gE>now?fDur(gE-now):'終了';
  document.getElementById('d-total-detail').innerHTML=`全体 <strong>${fDur(tSpan)}</strong> のうち <strong>${fDur(tElap)}</strong> 経過`;

  document.getElementById('d-day-pct').textContent=ti>=0?dPct.toFixed(1)+'%':'—';
  document.getElementById('d-day-bar').style.width=(ti>=0?dPct:0)+'%';
  document.getElementById('d-day-start').textContent=dStart;
  document.getElementById('d-day-end').textContent=dEnd;
  document.getElementById('d-day-elapsed').textContent=ti>=0&&dElap>0?fDur(dElap):'—';
  document.getElementById('d-day-remain').textContent=ti>=0?fDur(dRemain):'—';
  document.getElementById('d-day-detail').innerHTML=dDetail;

  const el=document.getElementById('d-status');el.textContent=status;el.className='status-badge '+sCls;

  days.forEach((d,i)=>{
    const dS=pDT(d.date,d.start),dE=pDT(d.date,d.end);
    let p=0,cls='day-block';
    if(d.date<todayStr){p=100;cls+=' past';}
    else if(d.date===todayStr){p=pct(now-dS,dE-dS);cls+=' today';}
    document.getElementById(`db-${i}`).className=cls;
    document.getElementById(`dbp-${i}`).textContent=p.toFixed(0)+'%';
  });

  updateSummaryChips();
  updatePiPWindow(s);
}

// ===== SAVE =====
function saveData(){
  localStorage.setItem('exhibition-actuals',JSON.stringify(actuals));
  const btn=document.querySelector('.btn-save');
  btn.textContent='✅ 保存しました！';
  setTimeout(()=>btn.textContent='💾 データを保存',2000);
}

// ===== PiP =====
async function openPiP(){
  if(!('documentPictureInPicture' in window)){alert('このブラウザはDocument PiP未対応です');return;}
  if(pipWin&&!pipWin.closed){pipWin.close();pipWin=null;return;}
  try{
    pipWin=await window.documentPictureInPicture.requestWindow({width:360,height:260});
    const style=pipWin.document.createElement('style');
    style.textContent=`
      *{box-sizing:border-box;margin:0;padding:0;}
      body{background:#0f1117;color:#e8eaf6;font-family:'Segoe UI',Arial,sans-serif;padding:14px;overflow:hidden;}
      .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
      .pe{font-size:.72rem;color:#8890b5;font-weight:600;}
      .ps{font-size:.68rem;padding:2px 10px;border-radius:20px;font-weight:600;}
      .status-open{background:rgba(67,233,123,.15);color:#43e97b;border:1px solid rgba(67,233,123,.3);}
      .status-closed,.status-ended{background:rgba(255,101,132,.15);color:#ff6584;border:1px solid rgba(255,101,132,.3);}
      .status-upcoming{background:rgba(108,99,255,.15);color:#6c63ff;border:1px solid rgba(108,99,255,.3);}
      .pc{font-size:1.9rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;letter-spacing:.06em;}
      .pb{display:flex;gap:8px;}
      .pbl{background:#1a1d2e;border-radius:10px;padding:9px 11px;flex:1;}
      .pbt{font-size:.62rem;color:#8890b5;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
      .ppr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
      .ppc{font-size:1.2rem;font-weight:800;}
      .prm{font-size:.68rem;color:#8890b5;}
      .pbw{background:#252840;border-radius:4px;height:5px;overflow:hidden;}
      .pbb{height:100%;border-radius:4px;}
      .day .ppc{color:#9c63ff;}.day .pbb{background:linear-gradient(90deg,#6c63ff,#9c63ff);}
      .total .ppc{color:#ff6584;}.total .pbb{background:linear-gradient(90deg,#ff6584,#ff9a9e);}
      .pkpi{display:flex;gap:6px;margin-top:8px;}
      .pk{background:#1a1d2e;border-radius:8px;padding:7px 10px;flex:1;text-align:center;}
      .pkt{font-size:.6rem;color:#8890b5;margin-bottom:2px;}
      .pkv{font-size:.95rem;font-weight:700;}
      .lead{color:#9c63ff;}.na{color:#ffd43b;}
    `;
    pipWin.document.head.appendChild(style);
    pipWin.document.body.innerHTML=`
      <div class="ph"><span class="pe" id="ppe"></span><span class="ps" id="pps"></span></div>
      <div class="pc" id="ppc"></div>
      <div class="pb">
        <div class="pbl day"><div class="pbt">📅 本日</div><div class="ppr"><span class="ppc" id="ppd"></span><span class="prm" id="ppdr"></span></div><div class="pbw"><div class="pbb" id="ppdb" style="width:0%"></div></div></div>
        <div class="pbl total"><div class="pbt">🗓 全体</div><div class="ppr"><span class="ppc" id="ppt"></span><span class="prm" id="pptr"></span></div><div class="pbw"><div class="pbb" id="pptb" style="width:0%"></div></div></div>
      </div>
      <div class="pkpi">
        <div class="pk"><div class="pkt">🟣 リード</div><div class="pkv lead" id="ppl">—</div></div>
        <div class="pk"><div class="pkt">🟡 NA数</div><div class="pkv na" id="ppn">—</div></div>
        <div class="pk"><div class="pkt">リード達成率</div><div class="pkv" id="pplr">—</div></div>
        <div class="pk"><div class="pkt">NA達成率</div><div class="pkv" id="ppnr">—</div></div>
      </div>
    `;
    pipInterval=setInterval(()=>{if(pipWin&&!pipWin.closed)updatePiPWindow(calcState());},1000);
    updatePiPWindow(calcState());
    pipWin.addEventListener('pagehide',()=>{clearInterval(pipInterval);pipWin=null;});
  }catch(e){alert('PiPを開けませんでした: '+e.message);}
}

function updatePiPWindow(s){
  if(!pipWin||pipWin.closed)return;
  const{now,tPct,dPct,dRemain,gE,status,sCls}=s;
  const g=id=>pipWin.document.getElementById(id);
  const set=(id,v)=>{const e=g(id);if(e)e.textContent=v;};
  const setW=(id,v)=>{const e=g(id);if(e)e.style.width=v;};
  set('ppe',config.eventName);
  set('ppc',now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  const sb=g('pps');if(sb){sb.textContent=status;sb.className='ps '+sCls;}
  set('ppd',s.ti>=0?dPct.toFixed(1)+'%':'—');
  setW('ppdb',(s.ti>=0?dPct:0)+'%');
  set('ppdr',s.ti>=0&&dRemain>0?'残り '+fDur(dRemain):'');
  set('ppt',tPct.toFixed(1)+'%');
  setW('pptb',tPct+'%');
  set('pptr',gE>now?'残り '+fDur(gE-now):'終了');

  // KPI totals
  const leadTotal=actuals.reduce((s,a)=>s+(a?.lead||0),0);
  const naTotal=actuals.reduce((s,a)=>s+(a?.na||0),0);
  const leadTgt=config.targets.reduce((s,t)=>s+t.lead,0);
  const naTgt=config.targets.reduce((s,t)=>s+t.na,0);
  set('ppl',leadTotal+' 件');
  set('ppn',naTotal+' 件');
  set('pplr',leadTgt>0?pct(leadTotal,leadTgt).toFixed(1)+'%':'—');
  set('ppnr',naTgt>0?pct(naTotal,naTgt).toFixed(1)+'%':'—');
}

// ===== RESET =====
function resetTracker(){
  clearInterval(timerInterval);
  if(pipWin&&!pipWin.closed){clearInterval(pipInterval);pipWin.close();}
  config=null;actuals=[];
  document.getElementById('setup-panel').style.display='block';
  document.getElementById('dashboard').style.display='none';
}
</script>
